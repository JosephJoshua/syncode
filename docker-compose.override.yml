services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: syncode-otel
    restart: unless-stopped
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: syncode-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"

  # NOTE: Loki 3.6+ uses a scratch-based image with no shell.
  # You cannot exec into this container or use CMD-SHELL healthchecks.
  loki:
    image: grafana/loki:3.6.7
    container_name: syncode-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.10.1
    container_name: syncode-tempo
    restart: unless-stopped
    ports:
      - "3200:3200" # HTTP
    volumes:
      - ./infra/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml

  # NOTE: Anonymous admin access is for local dev only. Never use in production.
  grafana:
    image: grafana/grafana:12.4.0
    container_name: syncode-grafana
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

volumes:
  loki_data:
  tempo_data:
  grafana_data:
