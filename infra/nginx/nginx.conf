events { worker_connections 1024; }

http {
    log_format combined_with_x_forwarded
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        '"$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log combined_with_x_forwarded;

    upstream web     { server web:80; }
    upstream api     { server control-plane:3000; }
    upstream collab  { server collab-plane:3001; }
    upstream livekit { server livekit:7880; }
    upstream storage { server seaweedfs:8333; }
    upstream grafana { server grafana:3000; }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 443 ssl default_server;
        http2 on;
        ssl_certificate     /etc/ssl/syncode-internal.crt;
        ssl_certificate_key /etc/ssl/syncode-internal.key;

        location / { proxy_pass http://web; }

        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path /auth /api/auth;
        }

        location ~ ^/ws(/.*)?$ {
            rewrite ^/ws/?(.*)$ /$1 break;
            proxy_pass http://collab;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location ~ ^/livekit(/.*)?$ {
            rewrite ^/livekit/?(.*)$ /$1 break;
            proxy_pass http://livekit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /storage/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET,POST,PUT,DELETE,PATCH' always;
                add_header Access-Control-Allow-Headers '*' always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass http://storage/;
            proxy_set_header Host $host;
        }

        location = /health { return 200 "OK"; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name s3.staging.syncode.anggita.org s3.syncode.anggita.org;

        ssl_certificate     /etc/ssl/syncode-internal.crt;
        ssl_certificate_key /etc/ssl/syncode-internal.key;

        client_max_body_size 50m;
        proxy_request_buffering off;

        location / {
            proxy_pass http://storage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 3334;
        location / { proxy_pass http://grafana; }
    }
}
