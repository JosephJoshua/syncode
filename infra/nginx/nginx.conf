worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream web     { server web:80; }
    upstream api     { server control-plane:3000; }
    upstream collab  { server collab-plane:3001; }
    upstream livekit { server livekit:7880; }
    upstream storage { server seaweedfs:8333; }
    upstream grafana { server grafana:3000; }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # The proxy VPS in front terminates TLS at :443, so we can safely declare HSTS here
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Allow self + inline styles (shadcn) + WebSocket + Monaco workers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; font-src 'self'; worker-src 'self' blob:; frame-ancestors 'none';" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    client_max_body_size 10m;

    # Trust X-Forwarded-* headers from the VPS reverse proxy.
    # TODO: Narrow down to proxy VPS IP.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;

        # SPA static files
        location / {
            proxy_pass http://web;
        }

        # REST API (strip /api prefix)
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path /auth /api/auth;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://collab/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # LiveKit WebRTC signaling
        location /livekit/ {
            proxy_pass http://livekit/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # S3-compatible storage (presigned URL uploads/downloads)
        location /storage/ {
            # CORS for browser direct uploads via presigned URLs
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Access-Control-Allow-Methods 'GET, PUT, HEAD, OPTIONS' always;
                add_header Access-Control-Allow-Headers '*' always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                return 204;
            }

            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Expose-Headers 'ETag, Content-Length, Content-Type' always;

            proxy_pass http://storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Avatar uploads are max ~256KB WebP, but allow some headroom
            client_max_body_size 2m;
        }

        # NOTE: /internal/* is NOT exposed
    }

    server {
        listen 3334;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/live/ {
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
