name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:cov

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/control-plane/coverage/lcov.info
            apps/collab-plane/coverage/lcov.info
            apps/execution-plane/coverage/lcov.info
            apps/ai-plane/coverage/lcov.info
            packages/infrastructure/coverage/lcov.info
            packages/shared/coverage/lcov.info
          retention-days: 1

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    name: Build and push images
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, sonar]
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=develop" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        env:
          TLDRAW_LICENSE_KEY: ${{ secrets.TLDRAW_LICENSE_KEY }}
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"
          for svc in web control-plane collab-plane execution-plane ai-plane; do
            IMAGE="${PREFIX}/syncode-${svc}"
            BUILD_ARGS=()
            if [ "${svc}" = "web" ]; then
              BUILD_ARGS+=(--build-arg "VITE_TLDRAW_LICENSE_KEY=${TLDRAW_LICENSE_KEY}")
            fi
            echo "::group::Building ${svc}"
            docker buildx build \
              --file "infra/docker/Dockerfile.${svc}" \
              "${BUILD_ARGS[@]}" \
              --tag "${IMAGE}:${TAG}" \
              --tag "${IMAGE}:${SHA}" \
              --push \
              --cache-from "type=gha,scope=${svc}" \
              --cache-to "type=gha,mode=max,scope=${svc}" \
              .
            echo "::endgroup::"
          done

  deploy-server:
    name: Deploy server
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    runs-on: [self-hosted, syncode-deploy]
    needs: [build-and-push]
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Pull, migrate, recreate, and verify server stack
        run: |
          set -euo pipefail
          test -n "${DEPLOY_PATH}" || { echo "DEPLOY_PATH is required"; exit 1; }

          cd "${DEPLOY_PATH}"

          services=(web control-plane collab-plane execution-plane ai-plane)
          case "${DEPLOY_BRANCH}" in
            main)
              env_file=".env.production"
              project_args=()
              health_url="https://syncode.anggita.org/api/health"
              nginx_container="syncode-nginx-1"
              expected_tag="latest"
              ;;
            develop)
              env_file=".env.staging"
              project_args=(-p syncode-staging)
              health_url="https://staging.syncode.anggita.org/api/health"
              nginx_container="syncode-staging-nginx-1"
              expected_tag="develop"
              ;;
            *)
              echo "Unsupported deploy branch: ${DEPLOY_BRANCH}" >&2
              exit 1
              ;;
          esac

          if [ ! -f "${env_file}" ]; then
            echo "Missing ${env_file}" >&2
            exit 1
          fi

          actual_tag=$(sudo awk -F= '/^IMAGE_TAG=/ { value=$2 } END { print value }' "${env_file}")
          if [ "${actual_tag}" != "${expected_tag}" ]; then
            echo "${env_file} has IMAGE_TAG=${actual_tag}; expected ${expected_tag}" >&2
            exit 1
          fi

          compose=(sudo docker compose -f docker-compose.prod.yml --env-file "${env_file}" "${project_args[@]}")

          echo "::group::Pull images"
          "${compose[@]}" pull "${services[@]}"
          echo "::endgroup::"

          echo "::group::Run migrations"
          "${compose[@]}" run -T --rm control-plane node migrate.mjs </dev/null
          echo "::endgroup::"

          echo "::group::Recreate app services"
          "${compose[@]}" up -d "${services[@]}"
          echo "::endgroup::"

          echo "::group::Reload nginx"
          sudo docker exec "${nginx_container}" nginx -t
          sudo docker exec "${nginx_container}" nginx -s reload
          echo "::endgroup::"

          echo "::group::Container status"
          "${compose[@]}" ps "${services[@]}" nginx livekit
          echo "::endgroup::"

          echo "::group::Health check"
          curl --fail --show-error --silent --retry 10 --retry-delay 3 "${health_url}"
          echo
          echo "::endgroup::"
