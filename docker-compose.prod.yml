services:
  nginx:
    image: nginx:1.28-alpine

    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-4443}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      control-plane:
        condition: service_healthy
      collab-plane:
        condition: service_healthy
    networks:
      - frontend
      - proxy

  web:
    image: ${REGISTRY_PREFIX:-ghcr.io/josephjoshua}/syncode-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - frontend

  control-plane:
    image: ${REGISTRY_PREFIX:-ghcr.io/josephjoshua}/syncode-control-plane:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.control-plane
    restart: unless-stopped
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy
      - backend

  collab-plane:
    image: ${REGISTRY_PREFIX:-ghcr.io/josephjoshua}/syncode-collab-plane:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.collab-plane
    restart: unless-stopped
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy
      - backend

  execution-plane:
    image: ${REGISTRY_PREFIX:-ghcr.io/josephjoshua}/syncode-execution-plane:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.execution-plane
    restart: unless-stopped
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  ai-plane:
    image: ${REGISTRY_PREFIX:-ghcr.io/josephjoshua}/syncode-ai-plane:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ai-plane
    restart: unless-stopped
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  watchtower:
    image: nickfedor/watchtower:1.14.3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG:-/root/.docker/config.json}:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-syncode}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.9.11
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    networks:
      - proxy
      - backend

  seaweedfs:
    image: chrislusf/seaweedfs:4.13
    restart: unless-stopped
    command: server -s3
    volumes:
      - seaweedfs_data:/data
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:9333/cluster/status",
        ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  frontend:
    driver: bridge
  proxy:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  seaweedfs_data:
