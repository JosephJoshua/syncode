sonar.organization=syncode
sonar.projectKey=syncode

sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=\
  **/node_modules/**,\
  **/.turbo/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/drizzle/**,\
  **/__mocks__/**,\
  **/routeTree.gen.ts

# Exclude telemetry.ts that might contain duplicated code since:
#   - Instrumentation lists will diverge further.
#   - Telemetry setup is startup boilerplate, 
#     and not business logic (no risk of them drifting to the point of causings bugs).
sonar.cpd.exclusions=\
  **/telemetry.ts

sonar.coverage.exclusions=\
  apps/web/src/**,\
  apps/*/src/main.ts,\
  apps/*/src/telemetry.ts,\
  apps/*/src/**/*.module.ts,\
  apps/*/src/**/*.config.ts,\
  apps/*/src/**/*.dto.ts,\
  apps/*/src/**/index.ts,\
  apps/*/src/**/*.decorator.ts,\
  apps/*/src/**/*.types.ts

sonar.typescript.tsconfigPaths=\
  apps/control-plane/tsconfig.json,\
  apps/collab-plane/tsconfig.json,\
  apps/web/tsconfig.json,\
  packages/shared/tsconfig.json,\
  packages/db/tsconfig.json,\
  packages/contracts/tsconfig.json,\
  packages/infrastructure/tsconfig.json

sonar.javascript.lcov.reportPaths=\
  apps/control-plane/coverage/lcov.info,\
  apps/collab-plane/coverage/lcov.info,\
  packages/infrastructure/coverage/lcov.info

sonar.sourceEncoding=UTF-8
