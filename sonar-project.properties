sonar.organization=syncode
sonar.projectKey=syncode

sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/src/test/**

sonar.exclusions=\
  **/node_modules/**,\
  **/.turbo/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/drizzle/**,\
  **/__mocks__/**,\
  **/routeTree.gen.ts

# Exclude cross-workspace boilerplate from copy-paste detection.
sonar.cpd.exclusions=\
  **/telemetry.ts,\
  **/vitest.config.ts,\
  **/biome.json,\
  apps/*/src/config/env.config.ts,\
  apps/*/src/app.module.ts

sonar.coverage.exclusions=\
  apps/web/src/**,\
  apps/*/src/test/**,\
  apps/*/src/main.ts,\
  apps/*/src/telemetry.ts,\
  apps/*/src/**/*.module.ts,\
  apps/*/src/**/*.config.ts,\
  apps/*/src/**/*.dto.ts,\
  **/index.ts,\
  apps/*/src/**/*.decorator.ts,\
  apps/*/src/**/*.types.ts,\
  packages/db/src/**,\
  packages/contracts/src/**,\
  packages/shared/src/ports/**,\
  packages/ui/src/**,\
  packages/shared/src/types/**,\
  packages/shared/src/constants.ts,\
  packages/shared/src/server.ts,\
  packages/infrastructure/src/cache/**,\
  packages/infrastructure/src/queue/**,\
  packages/infrastructure/src/storage/**,\
  packages/infrastructure/src/media/**,\
  packages/infrastructure/src/config.ts,\
  packages/infrastructure/src/circuit-breaker/circuit-breaker.module.ts,\
  packages/infrastructure/src/circuit-breaker/factories.ts,\
  packages/infrastructure/src/circuit-breaker/adapter-configs.ts,\
  apps/*/src/infrastructure/sandbox/**,\
  apps/*/src/infrastructure/clients/*.client.ts,\
  apps/control-plane/src/common/guards/global-permission.guard.ts,\
  apps/control-plane/src/common/guards/room-permission.guard.ts

sonar.typescript.tsconfigPaths=\
  apps/control-plane/tsconfig.json,\
  apps/collab-plane/tsconfig.json,\
  apps/execution-plane/tsconfig.json,\
  apps/ai-plane/tsconfig.json,\
  apps/web/tsconfig.json,\
  packages/shared/tsconfig.json,\
  packages/db/tsconfig.json,\
  packages/contracts/tsconfig.json,\
  packages/infrastructure/tsconfig.json

sonar.javascript.lcov.reportPaths=\
  apps/control-plane/coverage/lcov.info,\
  apps/collab-plane/coverage/lcov.info,\
  apps/execution-plane/coverage/lcov.info,\
  apps/ai-plane/coverage/lcov.info,\
  packages/infrastructure/coverage/lcov.info,\
  packages/shared/coverage/lcov.info

sonar.sourceEncoding=UTF-8
